<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌿 Minbar ⇄ Earth</title>
 <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="converter-card">
  <h1> Minbar · Earth</h1>
  <div class="subtitle">↻ side‑by‑side calendar</div>


  <div class="two-panels">
    <!-- EARTH PANEL -->
    <div class="panel">
      <h2>🌎 Earth · Gregorian</h2>
      <div class="input-group">
        <label>Date</label>
        <input type="number" id="earthYear" value="2264" min="1" max="9999" style="width:90px;"> 
        <select id="earthMonth"></select>
        <input type="number" id="earthDay" value="23" min="1" max="31" style="width:80px;">
      </div>
      <div class="calendar-preview">
        <div class="month-header">
          <button class="nav-btn" id="earthPrevMonth">←</button>
          <span class="month-name" id="earthMonthDisplay">September 2264</span>
          <button class="nav-btn" id="earthNextMonth">→</button>
        </div>
       <div class="calendar-grid seven-cols">
        <div class="weekday-header">Mon</div>
        <div class="weekday-header">Tue</div>
        <div class="weekday-header">Wed</div>
        <div class="weekday-header">Thu</div>
        <div class="weekday-header">Fri</div>
        <div class="weekday-header">Sat</div>
        <div class="weekday-header">Sun</div>
        <div class="calendar-grid seven-cols" id="earthCalendarGrid" style="display: contents;"></div>
      </div>
      </div>
    </div>

    <!-- VALEN PANEL -->
    <div class="panel">
      <h2>⚪ Minbar · Valen</h2>
    <div class="input-group flex-row">
      <label>Year</label>
      <input type="number" id="valenYear" value="754" min="1" step="1" style="width:100px;">
      <select id="valenMonth"></select>
      <input type="number" id="valenDay" value="2" min="1" step="1" style="width:80px;">
    </div>
      <div class="valen-month-header">
        <button class="nav-btn small" id="valenPrevMonth">←</button>
        <span class="valen-month-name" id="valenMonthDisplay">First Len'tar</span>
        <button class="nav-btn small" id="valenNextMonth">→</button>
      </div>
      <div style="margin: 4px 0 8px; font-size:0.8rem; color:#6a715a;">
        <span id="valenDayRange">Day 2 of 150</span>
      </div>
      
      <div id="valenCalendarContainer"></div>
    </div>
  </div>

  <div class="conversion-result" id="resultDisplay">
    <div style="display: flex; align-items: center; gap: 20px; flex-wrap: wrap;">
      <span id="resultMainText">📌 23 September 2264 ⇢ Valen 754 · First Len'tar day 2</span>
    </div>
    <div id="resultDetails" class="valen-meta"></div>
  </div>
</div>

   
  <script src="js/constants.js"></script>
  <script src="js/earth-utils.js"></script>
  <script src="js/valen-utils.js"></script>
  <script src="js/converter.js"></script>
  <script src="js/ui.js"></script>
  
<script>
  document.addEventListener('DOMContentLoaded', () => {
    initUI();
    updateUI();
  });
</script>

</body>
</html>
