<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌿 Minbar ⇄ Earth</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: system-ui, 'Segoe UI', 'Roboto', sans-serif;
    }
    body {
      background: #f5f3eb;
      min-height: 100vh;
      margin: 0;
      padding: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #1e2e1e;
    }
    .converter-card {
      max-width: 1400px;
      width: 100%;
      background: #fefcf6;
      border: 1px solid #c0bba8;
      border-radius: 36px;
      padding: 28px 30px 36px;
      box-shadow: 0 12px 28px -8px rgba(40, 30, 10, 0.12);
    }
    h1 {
      margin: 0 0 6px 0;
      font-weight: 400;
      font-size: 2.2rem;
      color: #2c422c;
    }
    .subtitle {
      margin-bottom: 20px;
      font-style: italic;
      color: #5e6e4e;
      border-bottom: 1px dashed #b9b094;
      padding-bottom: 10px;
    }
    .anchor-note {
      background: #e7e1cf;
      padding: 10px 22px;
      border-radius: 48px;
      text-align: center;
      border-left: 6px solid #9f8345;
      margin-bottom: 24px;
      color: #23311e;
    }
    .two-panels {
      display: flex;
      gap: 20px;
    }
    .panel {
      flex: 1;
      background: #faf8f0;
      border-radius: 28px;
      padding: 22px 20px;
      border: 1px solid #d6cdb2;
    }
    .panel h2 {
      margin-top: 0;
      margin-bottom: 20px;
      font-weight: 350;
      font-size: 1.8rem;
      color: #2e462e;
      border-bottom: 1px solid #dbd2bc;
      padding-bottom: 8px;
    }
    .input-group {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 12px;
      margin-bottom: 22px;
    }
    .input-group label {
      min-width: 40px;
      color: #3f5532;
    }
    .input-group input,
    .input-group select {
      background: #fffdf9;
      border: 1px solid #bcb09a;
      border-radius: 30px;
      padding: 8px 14px;
      color: #1c2b14;
      font-size: 1rem;
    }
    .flex-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      align-items: center;
    }
    .calendar-grid {
      display: grid;
      gap: 5px;
      text-align: center;
      margin-top: 8px;
    }
    .seven-cols {
      grid-template-columns: repeat(7, 1fr);
    }
    .weekday-header {
      font-weight: 600;
      color: #7d6e4b;
      padding: 4px 0;
      font-size: 0.8rem;
      text-transform: uppercase;
    }
    .cal-cell {
      background: #f4efe2;
      border-radius: 16px;
      padding: 8px 4px;
      font-size: 0.9rem;
      border: 1px solid #cec6ae;
      color: #2e3d24;
      cursor: pointer;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
    }
    .cal-cell.highlight {
      background: #c9af7a;
      color: #13200e;
      font-weight: bold;
      border-color: #a5833e;
    }
    .cal-cell.other-month {
      opacity: 0.3;
    }
    .cal-cell.free-day {
      background: #e8dcc8;
    }
    .cal-cell.empty-cell {
      background: transparent;
      border: 1px dashed #d4cbb8;
      cursor: default;
      opacity: 0.5;
    }
    .cal-cell.leap-day {
      background: #d4c4a0;
      border-color: #b8a67c;
    }
    .month-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 4px 0 8px;
    }
    .month-name {
      font-size: 1.3rem;
      color: #3f5532;
    }
    .valen-month-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 16px 0 6px;
    }
    .valen-month-name {
      font-size: 1.2rem;
      color: #4a6740;
    }
    .nav-btn {
      background: #f0eadc;
      border: 1px solid #b7aa8f;
      color: #3b4f2e;
      font-size: 1.6rem;
      width: 40px;
      height: 40px;
      border-radius: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .nav-btn.small {
      font-size: 1.3rem;
      width: 34px;
      height: 34px;
    }
    .nav-btn:hover {
      background: #dbcfb2;
    }
    .valen-calendar-wrapper {
      margin-top: 10px;
    }
    .valen-grid {
      display: grid;
      gap: 4px;
    }
    .lentar-grid {
      grid-template-columns: 55px repeat(9, 1fr);
    }
    .grid-label {
      font-size: 0.75rem;
      color: #6a715a;
      padding: 6px 2px;
      text-align: right;
    }
    .inter-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
    }
    .conversion-result {
      margin-top: 30px;
      background: #eae3d2;
      border-radius: 28px;
      padding: 18px 26px;
      border-left: 10px solid #a5833e;
      font-size: 1.2rem;
      color: #1e351a;
    }
    .valen-meta {
      font-size: 0.9rem;
      opacity: 0.8;
      margin-top: 8px;
      color: #4d5e3c;
    }
    .weekday-header.valen {
      text-transform: none;
      font-size: 0.7rem;
    }
    /* Season colors - these will be applied inline via JS, but keep as reference */
/* Spring: #d4e8c2 (light green) */
/* Summer: #f5d5a8 (warm peach) */
/* Autumn: #e8c78a (golden) */
/* Winter: #b8d4e8 (light blue) */

.cal-cell[title] {
    cursor: help;
}

/* Style for the hemisphere toggle button */
.panel h2 button {
    font-size: 0.8rem;
    padding: 4px 12px;
    margin-left: 10px;
    background: #d4cbb8;
    border-bottom-width: 2px;
}
  </style>
</head>
<body>
<div class="converter-card">
  <h1>🌍 Minbar · Earth</h1>
  <div class="subtitle">↻ side‑by‑side calendar</div>
  <div class="anchor-note">
    ⚓ FIXED ANCHOR · Earth: <strong>23 September 2264</strong> ⇢ Valen: <strong>Year 754, Day 2</strong>
  </div>

  <div class="two-panels">
    <!-- EARTH PANEL -->
    <div class="panel">
      <h2>🌎 Earth · Gregorian</h2>
      <div class="input-group">
        <label>Date</label>
        <input type="number" id="earthYear" value="2264" min="1" max="9999" style="width:90px;"> 
        <select id="earthMonth"></select>
        <input type="number" id="earthDay" value="23" min="1" max="31" style="width:80px;">
      </div>
      <div class="calendar-preview">
        <div class="month-header">
          <button class="nav-btn" id="earthPrevMonth">←</button>
          <span class="month-name" id="earthMonthDisplay">September 2264</span>
          <button class="nav-btn" id="earthNextMonth">→</button>
        </div>
        <div class="calendar-grid seven-cols" id="earthCalendarGrid">
          <div class="weekday-header">Mon</div>
          <div class="weekday-header">Tue</div>
          <div class="weekday-header">Wed</div>
          <div class="weekday-header">Thu</div>
          <div class="weekday-header">Fri</div>
          <div class="weekday-header">Sat</div>
          <div class="weekday-header">Sun</div>
        </div>
      </div>
    </div>

    <!-- VALEN PANEL -->
    <div class="panel">
      <h2>🪐 Minbar · Valen</h2>
      <div class="input-group flex-row">
        <label>Year</label>
        <input type="number" id="valenYear" value="754" min="1" step="1" style="width:100px;">
        <label style="margin-left: 6px;">Day</label>
        <input type="number" id="valenDay" value="2" min="1" max="486" step="1" style="width:90px;">
      </div>
      
      <div class="valen-month-header">
        <button class="nav-btn small" id="valenPrevMonth">←</button>
        <span class="valen-month-name" id="valenMonthDisplay">First Len'tar</span>
        <button class="nav-btn small" id="valenNextMonth">→</button>
      </div>
      <div style="margin: 4px 0 8px; font-size:0.8rem; color:#6a715a;">
        <span id="valenDayRange">Day 2 of 150</span>
      </div>
      
      <div id="valenCalendarContainer"></div>
    </div>
  </div>

  <div class="conversion-result" id="resultDisplay">
    <div style="display: flex; align-items: center; gap: 20px; flex-wrap: wrap;">
      <span id="resultMainText">📌 23 September 2264 ⇢ Valen 754 · First Len'tar day 2</span>
    </div>
    <div id="resultDetails" class="valen-meta"></div>
  </div>
</div>

<script>
(function() {
  "use strict";

  // Constants
  const VALEN_BASE_DAYS = 486;
  const VALEN_DAY_HOURS = 20 + 47/60;  // 20.78333... hours
  const EARTH_DAY_HOURS = 24;
  const VALEN_LEAP_CYCLE = 11;
  const VALEN_LEAP_REF = 748;
  
  // Anchor: Earth 2264-09-23 00:00 UTC = Valen 754 day 2 00:00
  const ANCHOR_EARTH = new Date(Date.UTC(2264, 8, 23, 0, 0, 0));
  const ANCHOR_VALEN_YEAR = 754;
  const ANCHOR_VALEN_DAY = 2;
  
  const EPOCH = new Date(Date.UTC(1970, 0, 1));
  const MS_PER_HOUR = 3600000;
  const MS_PER_EARTH_DAY = EARTH_DAY_HOURS * MS_PER_HOUR;
  const MS_PER_VALEN_DAY = VALEN_DAY_HOURS * MS_PER_HOUR;
  
  const EARTH_MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  
  // Season definitions with distinct colors
  // Winter = blue, Summer = green, Spring = pink, Autumn = orange
  function getSeasonEvents(year) {
    const marEquinox = 20;
    const junSolstice = 21;
    const sepEquinox = (year % 4 === 0) ? 22 : 23;
    const decSolstice = 21;
    
    return {
      northern: [
        { name: "Winter", start: { month: 11, day: decSolstice }, end: { month: 2, day: marEquinox - 1 }, color: "#a8c8e8", hover: `❄️ Winter (Dec ${decSolstice} - Mar ${marEquinox - 1})` },
        { name: "Spring", start: { month: 2, day: marEquinox }, end: { month: 5, day: junSolstice - 1 }, color: "#f0c0d0", hover: `🌸 Spring (Mar ${marEquinox} - Jun ${junSolstice - 1})` },
        { name: "Summer", start: { month: 5, day: junSolstice }, end: { month: 8, day: sepEquinox - 1 }, color: "#a8d8a8", hover: `☀️ Summer (Jun ${junSolstice} - Sep ${sepEquinox - 1})` },
        { name: "Autumn", start: { month: 8, day: sepEquinox }, end: { month: 11, day: decSolstice - 1 }, color: "#f0b860", hover: `🍂 Autumn (Sep ${sepEquinox} - Dec ${decSolstice - 1})` }
      ],
      southern: [
        { name: "Summer", start: { month: 11, day: decSolstice }, end: { month: 2, day: marEquinox - 1 }, color: "#a8d8a8", hover: `☀️ Summer (Dec ${decSolstice} - Mar ${marEquinox - 1})` },
        { name: "Autumn", start: { month: 2, day: marEquinox }, end: { month: 5, day: junSolstice - 1 }, color: "#f0b860", hover: `🍂 Autumn (Mar ${marEquinox} - Jun ${junSolstice - 1})` },
        { name: "Winter", start: { month: 5, day: junSolstice }, end: { month: 8, day: sepEquinox - 1 }, color: "#a8c8e8", hover: `❄️ Winter (Jun ${junSolstice} - Sep ${sepEquinox - 1})` },
        { name: "Spring", start: { month: 8, day: sepEquinox }, end: { month: 11, day: decSolstice - 1 }, color: "#f0c0d0", hover: `🌸 Spring (Sep ${sepEquinox} - Dec ${decSolstice - 1})` }
      ]
    };
  }
  
  function getSeasonForDate(year, month, day, hemisphere = 'northern') {
    const events = getSeasonEvents(year)[hemisphere];
    const dateValue = month * 100 + day;
    
    for (const season of events) {
      const startVal = season.start.month * 100 + season.start.day;
      const endVal = season.end.month * 100 + season.end.day;
      
      if (startVal <= endVal) {
        if (dateValue >= startVal && dateValue <= endVal) return season;
      } else {
        if (dateValue >= startVal || dateValue <= endVal) return season;
      }
    }
    return null;
  }
  
  function isValenLeap(year) {
    return (year - VALEN_LEAP_REF) % VALEN_LEAP_CYCLE === 0;
  }
  
  function getValenDaysInYear(year) {
    return isValenLeap(year) ? 488 : 486;
  }
  
  function getValenMonths(year) {
    const isLeap = isValenLeap(year);
    return [
      { name: "First Len'tar", days: 150, start: 1, type: 'lentar' },
      { name: "Inter One", days: 12, start: 151, type: 'inter' },
      { name: "Second Len'tar", days: 150, start: 163, type: 'lentar' },
      { name: "Inter Two", days: isLeap ? 14 : 12, start: 313, type: 'inter' },
      { name: "Third Len'tar", days: 150, start: isLeap ? 327 : 325, type: 'lentar' },
      { name: "Inter Three", days: 12, start: isLeap ? 477 : 475, type: 'inter' }
    ];
  }
  
  function getValenTotalBeforeYear(year) {
    let days = 0;
    for (let y = 1; y < year; y++) days += getValenDaysInYear(y);
    return days;
  }
  
  function getValenMonthInfo(year, dayOfYear) {
    const months = getValenMonths(year);
    for (let i = 0; i < months.length; i++) {
      const m = months[i];
      if (dayOfYear >= m.start && dayOfYear < m.start + m.days) {
        return { index: i, name: m.name, days: m.days, start: m.start, type: m.type, dayInMonth: dayOfYear - m.start + 1 };
      }
    }
    return null;
  }
  
  function isEarthLeap(year) {
    if (year % 400 === 0) return true;
    if (year % 100 === 0) return false;
    return year % 4 === 0;
  }
  
  function getEarthDaysInMonth(year, month) {
    const days = [31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
    if (month === 1 && isEarthLeap(year)) return 29;
    return days[month];
  }
  
  function earthToMs(y, m, d) {
    return new Date(Date.UTC(y, m, d, 0, 0, 0)).getTime();
  }
  
  function msToEarth(ms) {
    const date = new Date(ms);
    return { year: date.getUTCFullYear(), month: date.getUTCMonth(), day: date.getUTCDate(), hour: date.getUTCHours(), minute: date.getUTCMinutes() };
  }
  
  const anchorEarthMs = earthToMs(2264, 8, 23);
  
  function earthToValen(y, m, d) {
    const earthMs = earthToMs(y, m, d);
    const msDiff = earthMs - anchorEarthMs;
    const valenDaysDiff = msDiff / MS_PER_VALEN_DAY;
    let valenTotal = (getValenTotalBeforeYear(ANCHOR_VALEN_YEAR) + (ANCHOR_VALEN_DAY - 1)) + valenDaysDiff;
    
    let remaining = valenTotal;
    let year = 1;
    while (true) {
      const daysInYear = getValenDaysInYear(year);
      if (remaining < daysInYear) {
        const day = Math.floor(remaining) + 1;
        const timeOfDay = remaining - Math.floor(remaining);
        return { year, day, timeOfDay };
      }
      remaining -= daysInYear;
      year++;
    }
  }
  
  function valenToEarth(year, day) {
    const valenTotal = getValenTotalBeforeYear(year) + (day - 1);
    const valenDiff = valenTotal - (getValenTotalBeforeYear(ANCHOR_VALEN_YEAR) + (ANCHOR_VALEN_DAY - 1));
    const msDiff = valenDiff * MS_PER_VALEN_DAY;
    const earthMs = anchorEarthMs + msDiff;
    const roundedMs = Math.round(earthMs / MS_PER_EARTH_DAY) * MS_PER_EARTH_DAY;
    const earth = msToEarth(roundedMs);
    return { year: earth.year, month: earth.month, day: earth.day };
  }
  
  function formatTimeOfDay(timeOfDay) {
    const totalMinutes = timeOfDay * VALEN_DAY_HOURS * 60;
    const hours = Math.floor(totalMinutes / 60);
    const minutes = Math.floor(totalMinutes % 60);
    return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}`;
  }

  // State
  let state = {
    earthYear: 2264, earthMonth: 8, earthDay: 23,
    valenYear: 754, valenDay: 2, valenMonthIdx: 0,
    valenTimeOfDay: 0,
    hemisphere: 'northern'
  };

  // DOM elements
  const el = {
    earthYear: document.getElementById('earthYear'),
    earthMonth: document.getElementById('earthMonth'),
    earthDay: document.getElementById('earthDay'),
    earthMonthDisp: document.getElementById('earthMonthDisplay'),
    earthGrid: document.getElementById('earthCalendarGrid'),
    valenYear: document.getElementById('valenYear'),
    valenDay: document.getElementById('valenDay'),
    valenMonthDisp: document.getElementById('valenMonthDisplay'),
    valenDayRange: document.getElementById('valenDayRange'),
    valenContainer: document.getElementById('valenCalendarContainer'),
    resultMain: document.getElementById('resultMainText'),
    resultDetails: document.getElementById('resultDetails')
  };

  // Populate month select
  EARTH_MONTHS.forEach((m, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = m;
    el.earthMonth.appendChild(opt);
  });
  el.earthMonth.value = 8;

  function renderEarth() {
    const { earthYear, earthMonth, earthDay } = state;
    const firstDay = new Date(Date.UTC(earthYear, earthMonth, 1));
    let offset = (firstDay.getUTCDay() + 6) % 7;
    const daysInMonth = getEarthDaysInMonth(earthYear, earthMonth);
    
    const isLeap = isEarthLeap(earthYear);
    const leapText = (earthMonth === 1 && isLeap) ? ' (leap)' : '';
    el.earthMonthDisp.textContent = `${EARTH_MONTHS[earthMonth]} ${earthYear}${leapText}`;
    
    let html = '';
    for (let i = 0; i < offset; i++) html += `<div class="cal-cell other-month"></div>`;
    
    for (let d = 1; d <= daysInMonth; d++) {
      const sel = (d === earthDay);
      const season = getSeasonForDate(earthYear, earthMonth, d, state.hemisphere);
      const seasonStyle = season ? `background: ${season.color};` : '';
      const tooltip = season ? season.hover : '';
      
      html += `<div class="cal-cell ${sel ? 'highlight' : ''}" data-day="${d}" style="${seasonStyle}" title="${tooltip}">${d}</div>`;
    }
    
    const totalCells = Math.ceil((offset + daysInMonth) / 7) * 7;
    for (let i = offset + daysInMonth; i < totalCells; i++) html += `<div class="cal-cell other-month"></div>`;
    
    el.earthGrid.innerHTML = html;
    
    document.querySelectorAll('#earthCalendarGrid .cal-cell[data-day]').forEach(c => {
      c.addEventListener('click', () => {
        state.earthDay = parseInt(c.dataset.day);
        updateFromEarth();
      });
    });
  }

  function renderValen() {
    const { valenYear, valenDay, valenTimeOfDay } = state;
    const months = getValenMonths(valenYear);
    const info = getValenMonthInfo(valenYear, valenDay);
    const month = months[info.index];
    const selDay = info.dayInMonth;
    
    state.valenMonthIdx = info.index;
    
    const isLeap = isValenLeap(valenYear);
    const leapNote = (month.name === "Inter Two" && isLeap) ? ' (leap +2)' : '';
    el.valenMonthDisp.textContent = month.name + leapNote;
    
    const timeStr = formatTimeOfDay(valenTimeOfDay);
    el.valenDayRange.textContent = `Day ${selDay} of ${month.days} · ${timeStr}`;
    
    if (month.type === 'lentar') {
      let html = `<div class="valen-grid lentar-grid">`;
      html += `<div class="grid-label"></div>`;
      for (let i = 1; i <= 9; i++) html += `<div class="weekday-header valen">${i}</div>`;
      
      html += `<div class="grid-label">Free</div>`;
      for (let i = 1; i <= 9; i++) {
        if (i <= 3) {
          const d = i;
          html += `<div class="cal-cell free-day ${d === selDay ? 'highlight' : ''}" data-vday="${month.start + d - 1}">${d}</div>`;
        } else {
          html += `<div class="cal-cell empty-cell"></div>`;
        }
      }
      
      for (let w = 1; w <= 16; w++) {
        html += `<div class="grid-label">Week ${w}</div>`;
        for (let wd = 1; wd <= 9; wd++) {
          const d = 3 + (w - 1) * 9 + wd;
          html += `<div class="cal-cell ${d === selDay ? 'highlight' : ''}" data-vday="${month.start + d - 1}">${d}</div>`;
        }
      }
      
      html += `<div class="grid-label">Free</div>`;
      for (let i = 1; i <= 9; i++) {
        if (i <= 3) {
          const d = 147 + i;
          html += `<div class="cal-cell free-day ${d === selDay ? 'highlight' : ''}" data-vday="${month.start + d - 1}">${d}</div>`;
        } else {
          html += `<div class="cal-cell empty-cell"></div>`;
        }
      }
      html += `</div>`;
      el.valenContainer.innerHTML = html;
    } else {
      let html = `<div class="inter-grid">`;
      for (let d = 1; d <= month.days; d++) {
        const extra = (month.name === "Inter Two" && isLeap && d > 12) ? 'leap-day' : '';
        html += `<div class="cal-cell ${extra} ${d === selDay ? 'highlight' : ''}" data-vday="${month.start + d - 1}">${d}</div>`;
      }
      html += `</div>`;
      el.valenContainer.innerHTML = html;
    }
    
    document.querySelectorAll('[data-vday]').forEach(c => {
      c.addEventListener('click', () => {
        state.valenDay = parseInt(c.dataset.vday);
        state.valenTimeOfDay = 0;
        updateFromValen();
      });
    });
  }

  function updateFromEarth() {
    const conv = earthToValen(state.earthYear, state.earthMonth, state.earthDay);
    state.valenYear = conv.year;
    state.valenDay = conv.day;
    state.valenTimeOfDay = conv.timeOfDay;
    updateUI();
  }

  function updateFromValen() {
    const earth = valenToEarth(state.valenYear, state.valenDay);
    state.earthYear = earth.year;
    state.earthMonth = earth.month;
    state.earthDay = earth.day;
    updateUI();
  }

  function updateUI() {
    el.earthYear.value = state.earthYear;
    el.earthMonth.value = state.earthMonth;
    el.earthDay.value = state.earthDay;
    el.valenYear.value = state.valenYear;
    el.valenDay.value = state.valenDay;
    
    renderEarth();
    renderValen();
    
    const info = getValenMonthInfo(state.valenYear, state.valenDay);
    const timeStr = formatTimeOfDay(state.valenTimeOfDay);
    const season = getSeasonForDate(state.earthYear, state.earthMonth, state.earthDay, state.hemisphere);
    const seasonName = season ? season.name : '';
    
    el.resultMain.innerHTML = `📌 ${state.earthDay} ${EARTH_MONTHS[state.earthMonth]} ${state.earthYear} (${seasonName}) ⇢ Valen ${state.valenYear} · ${info.name} day ${info.dayInMonth} ${timeStr}`;
    
    const hourDiff = (state.valenTimeOfDay * VALEN_DAY_HOURS).toFixed(1);
    const hemiText = state.hemisphere === 'northern' ? 'N. Hemisphere' : 'S. Hemisphere';
    el.resultDetails.innerHTML = `📐 1 Valen day = ${VALEN_DAY_HOURS.toFixed(3)}h · ${hemiText} · Offset: +${hourDiff}h`;
  }

  // Add hemisphere toggle button
  const earthPanel = document.querySelector('.panel:first-child h2');
  const hemisphereBtn = document.createElement('button');
  hemisphereBtn.textContent = '🌍 S. Hemisphere';
  hemisphereBtn.style.cssText = 'font-size: 0.8rem; padding: 4px 12px; margin-left: 10px; background: #d4cbb8; border-bottom-width: 2px;';
  hemisphereBtn.addEventListener('click', (e) => {
    e.preventDefault();
    state.hemisphere = state.hemisphere === 'northern' ? 'southern' : 'northern';
    hemisphereBtn.textContent = state.hemisphere === 'northern' ? '🌍 S. Hemisphere' : '🌏 N. Hemisphere';
    renderEarth();
    updateUI();
  });
  earthPanel.appendChild(hemisphereBtn);

  // Event listeners
  document.getElementById('earthPrevMonth').addEventListener('click', () => {
    if (state.earthMonth === 0) { state.earthMonth = 11; state.earthYear--; }
    else state.earthMonth--;
    const max = getEarthDaysInMonth(state.earthYear, state.earthMonth);
    if (state.earthDay > max) state.earthDay = max;
    updateFromEarth();
  });
  
  document.getElementById('earthNextMonth').addEventListener('click', () => {
    if (state.earthMonth === 11) { state.earthMonth = 0; state.earthYear++; }
    else state.earthMonth++;
    const max = getEarthDaysInMonth(state.earthYear, state.earthMonth);
    if (state.earthDay > max) state.earthDay = max;
    updateFromEarth();
  });

  el.earthYear.addEventListener('change', () => {
    state.earthYear = parseInt(el.earthYear.value) || 2264;
    const max = getEarthDaysInMonth(state.earthYear, state.earthMonth);
    if (state.earthDay > max) state.earthDay = max;
    updateFromEarth();
  });

  el.earthMonth.addEventListener('change', () => {
    state.earthMonth = parseInt(el.earthMonth.value);
    const max = getEarthDaysInMonth(state.earthYear, state.earthMonth);
    if (state.earthDay > max) state.earthDay = max;
    updateFromEarth();
  });

  el.earthDay.addEventListener('change', () => {
    state.earthDay = parseInt(el.earthDay.value) || 1;
    const max = getEarthDaysInMonth(state.earthYear, state.earthMonth);
    if (state.earthDay > max) state.earthDay = max;
    updateFromEarth();
  });

  document.getElementById('valenPrevMonth').addEventListener('click', () => {
    const months = getValenMonths(state.valenYear);
    if (state.valenMonthIdx > 0) state.valenMonthIdx--;
    else { state.valenYear--; state.valenMonthIdx = getValenMonths(state.valenYear).length - 1; }
    state.valenDay = getValenMonths(state.valenYear)[state.valenMonthIdx].start;
    state.valenTimeOfDay = 0;
    updateFromValen();
  });

  document.getElementById('valenNextMonth').addEventListener('click', () => {
    const months = getValenMonths(state.valenYear);
    if (state.valenMonthIdx < months.length - 1) state.valenMonthIdx++;
    else { state.valenYear++; state.valenMonthIdx = 0; }
    state.valenDay = getValenMonths(state.valenYear)[state.valenMonthIdx].start;
    state.valenTimeOfDay = 0;
    updateFromValen();
  });

  el.valenYear.addEventListener('change', () => {
    state.valenYear = parseInt(el.valenYear.value) || 754;
    const max = getValenDaysInYear(state.valenYear);
    if (state.valenDay > max) state.valenDay = max;
    state.valenTimeOfDay = 0;
    updateFromValen();
  });

  el.valenDay.addEventListener('change', () => {
    state.valenDay = parseInt(el.valenDay.value) || 1;
    const max = getValenDaysInYear(state.valenYear);
    if (state.valenDay > max) state.valenDay = max;
    state.valenTimeOfDay = 0;
    updateFromValen();
  });

  // Initialize
  updateUI();
})();
</script>
</body>
</html>
